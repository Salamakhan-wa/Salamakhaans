<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
     <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="active">Home</a>
    <a href="courses.html">Courses</a>
    <a href="gallery.html">Gallery</a>
    <a href="facilities.html">Facilities</a>
    <a href="contact.html">Contact</a>
  </nav>
</head>
<body>
     <!-- Institute Name -->
  <header class="hero">
    <h1>The Eagle Institute Charbagh Swat</h1>
    <p>Get in Touch With Us</p>
  </header>

  <!-- Contact Section -->
  <div class="contact">
    <h2>Contact Information</h2>
    <p><strong>Address:</strong> Charbagh, Swat, Khyber Pakhtunkhwa</p>
    <p><strong>Phone:</strong> +92 3459526885</p>
    <p><strong>Email:</strong> info@eagleinstitute.com</p>

    <h2>Send Us a Message</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
<style>
        body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f4f4;
      color: #333;
    }
    /* Navigation Bar */
.navbar {
  background: #004080;
  padding: 15px;
  text-align: center;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  animation: slideDown 1s ease-in-out;
}

.navbar a {
  color: white;
  margin: 0 20px;
  text-decoration: none;
  font-weight: bold;
  transition: color 0.3s ease, transform 0.3s ease;
  font-size: 1.2em;
}

.navbar a:hover {
  color: #ffcc00;
  transform: scale(1.1);
}

.navbar .active {
  border-bottom: 2px solid #ffcc00;
}

    /* Hero Section */
    .hero {
      background: linear-gradient(120deg, #004080, #0066cc);
      color: white;
      text-align: center;
      padding: 50px 20px;
      animation: fadeIn 2s ease-in-out;
    }

    .hero h1 {
      font-size: 2.5em;
      margin: 0;
      animation: glowText 3s infinite alternate;
    }

    .hero p {
      font-size: 1.3em;
      margin-top: 10px;
    }

    /* Contact Section */
    .contact {
      max-width: 800px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.25);
      animation: fadeInUp 1.5s ease-in-out;
    }

    .contact h2 {
      color: #004080;
      margin-bottom: 20px;
      font-size: 1.8em;
    }

    .contact p {
      font-size: 1.2em;
      line-height: 1.6;
      color: #444;
    }

    /* Contact Form */
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }

    input, textarea {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: #004080;
      outline: none;
    }

    button {
      background: #004080;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    button:hover {
      background: #0066cc;
      transform: scale(1.05);
    }

    /* Animations */
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes fadeInUp {
      from {transform: translateY(30px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }

    @keyframes glowText {
      from {text-shadow: 0 0 10px #ffcc00;}
      to {text-shadow: 0 0 20px #ffffff;}
    }

</style>
</body>
</html>
